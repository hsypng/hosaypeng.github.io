---
layout: default
---
<article class="post">
    <header class="post-header">
        <h1 class="post-title">{{ page.title | escape }}</h1>
        {% if page.tags and page.tags.size > 0 %}
        <div class="post-tags">
            {% for tag in page.tags %}
            <a href="/?tag={{ tag | slugify }}" class="tag">{{ tag }}</a>
            {% endfor %}
        </div>
        {% endif %}
    </header>

    <div class="post-content">
        {{ content }}
    </div>

    <div class="post-footer">
        <a href="{{ '/' | relative_url }}">&larr; Back</a>
    </div>
</article>

<style>
    .post-header {
        margin-bottom: 2.5rem;
        text-align: left;
    }

    .post-title {
        margin-bottom: 0.5rem;
    }

    .post-tags {
        margin-top: 0.5rem;
    }

    .post-tags .tag {
        display: inline-block;
        font-size: 0.875rem;
        color: var(--text-muted);
        margin-right: 0.5rem;
        text-decoration: none;
    }

    .post-tags .tag:hover {
        color: var(--text-color);
    }

    .post-tags .tag::before {
        content: "#";
    }

    .post-meta {
        color: var(--text-muted);
    }

    .post-content {
        line-height: 1.8;
    }

    .post-content h2 {
        margin-top: 2.5rem;
    }

    .post-footer {
        margin-top: 4rem;
        padding-top: 2rem;
        border-top: 1px solid var(--border-color);
    }

    .post-footer a {
        color: var(--text-muted);
    }

    .post-footer a:hover {
        color: var(--text-color);
    }
</style>
